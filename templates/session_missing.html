<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
  </head>
  <body>
    <main class="missing-shell">
      <section class="missing-card">
        <div class="label label-error">Session missing</div>
        <h1>{{ title }}</h1>
        <p>{{ message }}</p>
        <div class="missing-meta">Session ID: {{ session_id }}</div>
        <div class="missing-actions">
          <a class="missing-link" href="{{ url_for('home') }}">Receiver home</a>
        </div>
      </section>
    </main>
  </body>
</html>
