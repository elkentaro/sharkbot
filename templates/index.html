<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SharkBot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
  </head>
  <body data-session-id="{{ session_id }}">
    <main class="shell">
      <section class="chat-panel">
        <header class="chat-header">
          <div class="header-brand">
            <h1>SharkBot</h1>
            <p class="subtitle">Wireshark packet analysis companion</p>
            <div class="brand-version">Version v1.7.0</div>
          </div>
          <div class="chat-header-main">
            <div class="header-session-block">
              <div class="session-header">Investigation <span id="sessionTitle">{{ session_id }}</span></div>
              <div id="playbookStatus" class="playbook-status" hidden></div>
            </div>
            <div class="topbar-actions">
              <button type="button" id="copySessionIdBtn" class="secondary">Copy ID</button>
              <button type="button" id="exportChatBtn" class="secondary">Download Chat</button>
              <button type="button" id="reconfigureAiBtn" class="secondary">Reconfigure AI</button>
              <label class="theme-control" for="themeSelect">
                <span class="topbar-theme-label">Theme</span>
                <select id="themeSelect" class="topbar-theme-select">
                  <option value="dark">Dark</option>
                  <option value="light">Light</option>
                </select>
              </label>
              <button type="button" id="clearBtn" class="secondary">Clear</button>
            </div>
          </div>
        </header>

        <section class="hidden-backend-controls" aria-hidden="true">
          <div class="card-title">Hidden backend controls</div>
          <label class="field-label" for="providerSelect">Provider</label>
          <select id="providerSelect">
            <option value="rule_based">Rule-Based</option>
          </select>
          <label class="field-label" for="modelSelect">Model</label>
          <select id="modelSelect">
            <option value="builtin">Builtin</option>
          </select>
          <button type="button" id="saveSettingsBtn" class="secondary">Use this backend</button>
        </section>
        <div id="messages" class="messages"></div>
        <form id="composer" class="composer">
          <input id="prompt" type="text" autocomplete="off" placeholder="Ask about this packet or ask for a Wireshark display filter..." />
          <button type="submit">Send</button>
        </form>
      </section>
    </main>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
</html>
