prompt = "Show all DNS traffic involving this IP"
kind = "recommended_step"
context_flags_all = ["has_selected_ip"]

[[next_step_rules]]
id = "recommended_dns_only"
label = "Recommended next step: Show only DNS traffic"
prompt = "Show only DNS traffic"
kind = "recommended_step"

