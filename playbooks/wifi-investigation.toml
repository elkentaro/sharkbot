id = "wifi_investigation"
name = "802.11 / Wi-Fi Investigation"
description = "Guide SOC-style triage of Wi-Fi management, control, and data traffic, including wireless anomalies and client/AP relationships."
built_in = true

system_guidance = """
Act like an 802.11 packet analyst.
Prioritize AP and client roles, management frames, authentication and association behavior, deauthentication patterns, retransmissions, roaming clues, encryption context, and suspicious wireless behavior.
Prefer concrete Wireshark pivots that isolate one client, one BSSID, one SSID, or one wireless exchange.
Bias toward steps a SOC level 1 analyst can follow: explain the frame, identify the devices involved, scope the wireless exchange, and then decide whether the problem is isolated or widespread.
"""

prompt_hints = [
  "Explain this Wi-Fi packet",
  "Show all traffic involving this wireless device",
  "Show traffic for this SSID",
  "Show beacon frames for this SSID",
  "Show probe request and response frames",
  "Show traffic on this wireless channel",
  "Show related 802.11 traffic",
  "Explain this authentication or association exchange",
  "Why does this Wi-Fi traffic look unusual?",
  "Why did this wireless authentication fail?",
]

rule_hints = [
  "wlan",
  "wlan.sa",
  "wlan.da",
  "wlan.addr",
]

preferred_guidance = [
  "open_endpoints",
  "apply_filter",
  "open_conversations",
  "scope_host_or_device",
  "open_packet_lengths",
  "open_expert_information",
]

fallback_guidance = [
  "ask_ai_for_next_move",
]

handrail_reason = "The Wi-Fi playbook now supports a structured handrail so the analyst can move between device scoping, anomaly views, and their own Wireshark pivots without losing coherence."

