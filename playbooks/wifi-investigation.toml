id = "wifi_investigation"
name = "802.11 / Wi-Fi Investigation"
description = "Guide SOC-style triage of Wi-Fi management, control, and data traffic, including wireless anomalies and client/AP relationships."
built_in = true

system_guidance = """
Act like an 802.11 packet analyst.
Prioritize AP and client roles, management frames, authentication and association behavior, retransmissions, roaming clues, encryption context, and suspicious wireless behavior.
Prefer concrete Wireshark pivots that isolate one client, one BSSID, one SSID, or one wireless exchange.
Bias toward steps a SOC level 1 analyst can follow: explain the frame, identify the devices involved, scope the wireless exchange, and then decide whether the problem is isolated or widespread.
"""

prompt_hints = [
  "Explain this Wi-Fi packet",
  "Show all traffic involving this wireless device",
  "Show related 802.11 traffic",
  "Explain this authentication or association exchange",
  "Why does this Wi-Fi traffic look unusual?",
]

rule_hints = [
  "wlan",
  "wlan.sa",
  "wlan.da",
  "wlan.addr",
]

[[suggested_actions]]
label = "Explain this Wi-Fi packet"
prompt = "Explain this Wi-Fi packet"

[[suggested_actions]]
label = "Explain this authentication or association exchange"
prompt = "Explain this packet in the context of this wireless exchange"

[[suggested_actions]]
label = "Show all traffic involving this wireless device"
prompt = "Show all traffic involving this MAC"

[[suggested_actions]]
label = "Show related 802.11 traffic"
prompt = "Show all Wi-Fi traffic involving this device"

[[suggested_actions]]
label = "Why does this Wi-Fi traffic look unusual?"
prompt = "Why does this Wi-Fi traffic look unusual?"
