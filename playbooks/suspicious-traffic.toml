id = "suspicious_traffic"
name = "Suspicious Traffic"
description = "Guide SOC level 1 triage of unusual, hostile, or unclear traffic patterns."
built_in = true

system_guidance = """
Act like a packet analyst supporting incident triage.
Prioritize packet explanation, unexpected peers, suspicious control patterns, host scoping, scope expansion, and the next best containment-oriented pivots.
Prefer concrete filters and next steps over generic advice.
Help the user decide whether the traffic looks routine, misconfigured, scan-like, redirected, host-compromise related, or worth escalation, and make clear what evidence supports that decision.
"""

prompt_hints = [
  "Explain this packet",
  "Why is this packet suspicious?",
  "Show all traffic involving this device",
  "Show only ARP traffic",
  "Show only ICMP traffic",
  "Show only DHCP traffic",
  "Show fragmentation-related traffic",
  "Show related traffic",
  "Show unusual or expert-marked packets",
  "Explain this packet in the context of the current filter",
  "Why does this traffic look like scanning or redirection?",
]

rule_hints = [
  "_ws.expert",
  "tcp.flags.reset == 1",
  "icmp",
  "dns",
]

preferred_guidance = [
  "open_endpoints",
  "open_protocol_hierarchy",
  "open_io_graph",
  "open_expert_information",
  "open_conversations",
]

fallback_guidance = [
  "ask_ai_for_next_move",
]

handrail_reason = "The suspicious-traffic playbook now supports a structured triage path so the analyst can branch from noisy, empty, or surprising findings without losing scope."

