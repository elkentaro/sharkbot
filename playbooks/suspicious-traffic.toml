look_for = "Which warning points to the next host, flow, or protocol to investigate."

[[handrail_alternates]]
step_id = "open_io_graph"
title = "Open IO Graphs"
kind = "open_io_graph"
rationale = "If the anomaly feels bursty or periodic, graph it before drilling into one packet."
instructions = "Open Statistics > IO Graphs and compare the suspicious traffic over time."
look_for = "Spikes, repeating bursts, or time windows where the anomaly clearly stands out."

[[handrail_alternates]]
step_id = "open_protocol_hierarchy"
title = "Open Protocol Hierarchy"
