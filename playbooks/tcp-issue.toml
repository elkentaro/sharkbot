id = "tcp_issue"
name = "TCP Issue"
description = "Guide SOC-style triage of broken, slow, or suspicious TCP sessions."
built_in = true

system_guidance = """
Act like a TCP troubleshooting specialist.
Prioritize peer identification, conversation isolation, retransmissions, duplicate ACKs, resets, zero-window behavior, keep-alive patterns, and stream-level explanation.
Bias toward the next step a SOC level 1 analyst can safely take in Wireshark without assuming root cause too early.
Separate direct packet evidence from inference, and explain how each narrowing step helps confirm scope, impact, which side appears to fail first, and whether latency looks client-side, server-side, or in transit.
"""

prompt_hints = [
  "Explain this TCP packet",
  "Show this TCP conversation",
  "Show TCP handshake packets in this conversation",
  "Show retransmissions",
  "Show duplicate ACKs",
  "Show resets",
  "Show zero-window packets",
  "Explain this packet in the context of the current filter",
  "Why does this TCP traffic look slow?",
]

rule_hints = [
  "tcp",
  "tcp.analysis.retransmission",
  "tcp.analysis.duplicate_ack",
  "tcp.flags.reset == 1",
]

preferred_guidance = [
  "open_conversations",
  "follow_stream",
  "open_tcp_rtt_graph",
  "apply_filter",
  "open_expert_information",
]

fallback_guidance = [
  "ask_ai_for_next_move",
]

handrail_reason = "The TCP playbook now exposes a structured next move so the investigation can survive context changes and branch from what you saw."

[[suggested_actions]]
label = "Show this TCP conversation"
prompt = "Show this TCP conversation"
kind = "open_conversations"

[[suggested_actions]]
label = "Explain this TCP packet"
prompt = "Explain this TCP packet"
kind = "explain_packet"

[[suggested_actions]]
label = "Show retransmissions"
prompt = "Show retransmissions"
kind = "apply_filter"

[[suggested_actions]]
label = "Show TCP handshake packets"
prompt = "Show TCP handshake packets in this conversation"
kind = "apply_filter"

[[suggested_actions]]
label = "Show duplicate ACKs"
