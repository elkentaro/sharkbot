<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="Wireshark Conversations reference">
  <rect width="1200" height="720" fill="#0f172a"/>
  <rect x="40" y="36" width="1120" height="648" rx="18" fill="#111827" stroke="#334155" stroke-width="2"/>
  <rect x="72" y="72" width="1056" height="46" rx="10" fill="#1e293b"/>
  <text x="96" y="101" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="26" font-weight="700">Statistics &gt; Conversations</text>
  <rect x="72" y="140" width="220" height="36" rx="8" fill="#0f766e"/>
  <text x="92" y="164" fill="#ecfeff" font-family="Arial, sans-serif" font-size="20" font-weight="700">TCP Tab Selected</text>
  <rect x="72" y="196" width="1056" height="56" rx="8" fill="#1f2937"/>
  <text x="94" y="230" fill="#93c5fd" font-family="Arial, sans-serif" font-size="18">Address A</text>
  <text x="334" y="230" fill="#93c5fd" font-family="Arial, sans-serif" font-size="18">Address B</text>
  <text x="634" y="230" fill="#93c5fd" font-family="Arial, sans-serif" font-size="18">Packets</text>
  <text x="824" y="230" fill="#93c5fd" font-family="Arial, sans-serif" font-size="18">Bytes</text>
  <rect x="72" y="270" width="1056" height="78" rx="8" fill="#1d4ed8" opacity="0.28" stroke="#93c5fd"/>
  <text x="94" y="314" fill="#f8fafc" font-family="Arial, sans-serif" font-size="24" font-weight="700">10.0.0.5:51514</text>
  <text x="334" y="314" fill="#f8fafc" font-family="Arial, sans-serif" font-size="24" font-weight="700">198.51.100.9:443</text>
  <text x="654" y="314" fill="#f8fafc" font-family="Arial, sans-serif" font-size="24" font-weight="700">2,184</text>
  <text x="840" y="314" fill="#f8fafc" font-family="Arial, sans-serif" font-size="24" font-weight="700">3.2 MB</text>
  <text x="94" y="390" fill="#fcd34d" font-family="Arial, sans-serif" font-size="24" font-weight="700">Look for the dominant pair, then sort by bytes or packets.</text>
  <text x="94" y="430" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="22">Use this view to identify the conversation worth following next.</text>
  <rect x="72" y="474" width="1056" height="148" rx="12" fill="#0b1220" stroke="#334155"/>
  <text x="94" y="516" fill="#5eead4" font-family="Arial, sans-serif" font-size="22" font-weight="700">Handrail cue</text>
  <text x="94" y="556" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="24">If one pair clearly dominates, branch into Follow Stream or RTT checks.</text>
  <text x="94" y="594" fill="#94a3b8" font-family="Arial, sans-serif" font-size="22">If the list is noisy, step back to Endpoints instead of chasing one packet.</text>
</svg>
