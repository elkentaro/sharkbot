<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="Wireshark Endpoints reference">
  <rect width="1200" height="720" fill="#0b1220"/>
  <rect x="40" y="36" width="1120" height="648" rx="18" fill="#111827" stroke="#334155" stroke-width="2"/>
  <rect x="72" y="72" width="1056" height="46" rx="10" fill="#1e293b"/>
  <text x="96" y="101" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="26" font-weight="700">Statistics &gt; Endpoints</text>
  <rect x="72" y="140" width="220" height="36" rx="8" fill="#0f766e"/>
  <text x="92" y="164" fill="#ecfeff" font-family="Arial, sans-serif" font-size="20" font-weight="700">IPv4 Tab Selected</text>
  <rect x="72" y="196" width="1056" height="56" rx="8" fill="#1f2937"/>
  <text x="94" y="230" fill="#93c5fd" font-family="Arial, sans-serif" font-size="18">Address</text>
  <text x="474" y="230" fill="#93c5fd" font-family="Arial, sans-serif" font-size="18">Packets</text>
  <text x="684" y="230" fill="#93c5fd" font-family="Arial, sans-serif" font-size="18">Bytes</text>
  <rect x="72" y="270" width="1056" height="78" rx="8" fill="#0f766e" opacity="0.22" stroke="#5eead4"/>
  <text x="94" y="314" fill="#f8fafc" font-family="Arial, sans-serif" font-size="24" font-weight="700">10.0.0.5</text>
  <text x="494" y="314" fill="#f8fafc" font-family="Arial, sans-serif" font-size="24" font-weight="700">8,912</text>
  <text x="708" y="314" fill="#f8fafc" font-family="Arial, sans-serif" font-size="24" font-weight="700">42.7 MB</text>
  <text x="94" y="390" fill="#fcd34d" font-family="Arial, sans-serif" font-size="24" font-weight="700">Look for one host or device that dominates the traffic.</text>
  <text x="94" y="430" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="22">Use this when the capture is broad and you need to pick the right host before drilling deeper.</text>
  <rect x="72" y="474" width="1056" height="148" rx="12" fill="#0f172a" stroke="#334155"/>
  <text x="94" y="516" fill="#5eead4" font-family="Arial, sans-serif" font-size="22" font-weight="700">Handrail cue</text>
  <text x="94" y="556" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="24">If one host stands out, scope that endpoint or compare its conversations next.</text>
  <text x="94" y="594" fill="#94a3b8" font-family="Arial, sans-serif" font-size="22">If nothing stands out, return to Protocol Hierarchy or Expert Information.</text>
</svg>
